version: "2"

linters:
  enable:
    - errcheck
    - govet
    - revive
    - staticcheck
    - misspell
    - gosec

  settings:
    gosec:
      excludes:
        - G115

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - revive
        path: _test\.go
    paths:
      - examples/
      - third_party/

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - examples/
